<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnet ↔ Torrent 转换器</title>
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      var d = document.documentElement;
      function getTheme(v){ return v==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):v; }
      d.setAttribute('data-theme', getTheme(t));
    })();
  </script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="max-w-[900px] mx-auto px-5 py-10">
    <header class="text-center mb-8 relative">
      <h1 class="text-2xl font-semibold tracking-tight">Magnet ↔ Torrent</h1>
      <p class="text-sm text-base-content/50 mt-1.5">纯前端转换，数据不离开浏览器</p>
      <button id="theme-toggle" class="btn btn-ghost btn-sm btn-circle absolute right-0 top-0" title="跟随系统">
        <!-- 浅色：太阳 -->
        <svg class="w-5 h-5 theme-icon-sun hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <!-- 暗色：月亮 -->
        <svg class="w-5 h-5 theme-icon-moon hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
        <!-- 跟随系统：电脑屏幕 -->
        <svg class="w-5 h-5 theme-icon-system" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-9V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v2.25m18 0v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 14.25v-6m18 0H3"/></svg>
      </button>
    </header>

    <div role="tablist" class="tabs tabs-bordered mb-5">
      <button role="tab" class="tab tab-active" data-tab="magnet-to-torrent">磁力转种子</button>
      <button role="tab" class="tab" data-tab="torrent-to-magnet">种子转磁力</button>
    </div>

    <!-- 磁力转种子 -->
    <section id="magnet-to-torrent" class="tab-panel">
      <div class="card bg-base-100 border border-base-300 p-5 mb-4">
        <label for="magnet-input" class="label text-sm font-medium">输入磁力链接（每行一个，支持批量）</label>
        <textarea id="magnet-input" class="textarea textarea-bordered w-full font-mono text-sm leading-relaxed h-36" placeholder="magnet:?xt=urn:btih:..."></textarea>
        <div id="magnet-error" class="alert alert-error mt-2 hidden">
          <span></span>
        </div>
        <button id="magnet-convert-btn" class="btn btn-primary w-full mt-3">转换为种子文件</button>
      </div>
      <div id="magnet-results" class="card bg-base-100 border border-base-300 hidden">
        <div class="flex items-center justify-between p-4 border-b border-base-300 gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <input type="checkbox" id="magnet-select-all" class="checkbox checkbox-primary checkbox-sm" />
            <span class="text-sm font-medium text-base-content/60 whitespace-nowrap">转换结果</span>
            <span id="magnet-count" class="badge badge-ghost badge-sm hidden"></span>
          </div>
          <button id="magnet-download-all-btn" class="btn btn-outline btn-primary btn-sm hidden" disabled>下载选中</button>
        </div>
        <div id="magnet-results-list"></div>
      </div>
    </section>

    <!-- 种子转磁力 -->
    <section id="torrent-to-magnet" class="tab-panel hidden">
      <div class="card bg-base-100 border border-base-300 p-5 mb-4">
        <div id="drop-zone" class="border border-dashed border-base-300 rounded-lg py-12 px-5 min-h-[120px] flex items-center justify-center text-center cursor-pointer transition-colors hover:border-base-content/30 hover:bg-base-200">
          <p class="text-sm text-base-content/50 leading-relaxed drop-zone-text">拖拽 .torrent 文件到这里<br>或 <span class="text-primary font-medium underline underline-offset-2">点击选择文件</span></p>
          <input id="torrent-file-input" type="file" accept=".torrent" multiple class="hidden" />
        </div>
        <div id="torrent-error" class="alert alert-error mt-2 hidden">
          <span></span>
        </div>
      </div>
      <div id="torrent-results" class="card bg-base-100 border border-base-300 hidden">
        <div class="flex items-center justify-between p-4 border-b border-base-300 gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <input type="checkbox" id="torrent-select-all" class="checkbox checkbox-primary checkbox-sm" />
            <span class="text-sm font-medium text-base-content/60 whitespace-nowrap">转换结果</span>
            <span id="torrent-count" class="badge badge-ghost badge-sm hidden"></span>
          </div>
          <button id="torrent-copy-all-btn" class="btn btn-outline btn-primary btn-sm hidden" disabled>复制选中</button>
        </div>
        <div id="torrent-results-list"></div>
      </div>
    </section>

    <footer class="text-center mt-8 pt-4 border-t border-base-300 text-xs text-base-content/40">
      <p>所有数据仅在浏览器本地处理，不会上传到任何服务器</p>
    </footer>
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
